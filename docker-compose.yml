services:
  backend:
    build: ./backend
    volumes:
      - app_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-key}
      - DATABASE_URL=sqlite:///./data/family_ledger.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  app_data:
